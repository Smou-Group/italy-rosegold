<!doctype html>
<html lang="ar" dir="rtl">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>الكبائن الروزجلود | Rosegold Cabin — SMOU GROUP</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<style>
:root{
  --bg1:#03060d;
  --bg2:#081527;
  --sky:#8fd6ff;
  --sky-light:#d7f1ff;
  --sky-deep:#3d8fd0;
  --ivory:#ffffff;
  --text:#eef6ff;
  --muted:rgba(238,246,255,.68);
  --border:rgba(143,214,255,.22);
  --glass: linear-gradient(160deg, rgba(255,255,255,.07), rgba(255,255,255,.02));
  --shadow:0 18px 45px rgba(0,0,10,.40);
  --shadowStrong:0 30px 80px rgba(0,0,10,.55);
}

*{box-sizing:border-box}
html{scroll-behavior:smooth}
body{
  margin:0;
  font-family:"Tajawal", system-ui, sans-serif;
  background:linear-gradient(180deg,#03060d,#081527 55%,#050d1a);
  color:var(--text);
  overflow-x:hidden;
  position:relative;
}

body::before,
body::after{
  content:"";
  position:fixed;
  inset:auto;
  width:34vw;
  height:34vw;
  border-radius:50%;
  filter:blur(110px);
  opacity:.16;
  pointer-events:none;
  z-index:0;
  animation:blobFloat 12s ease-in-out infinite;
}
body::before{ top:-8vw; right:-6vw; background:radial-gradient(circle, rgba(143,214,255,.9), transparent 64%); }
body::after{ left:-8vw; bottom:-10vw; background:radial-gradient(circle, rgba(255,255,255,.3), transparent 60%); animation-delay:-5s; }
@keyframes blobFloat{ 0%,100%{transform:translateY(0) scale(1)} 50%{transform:translateY(-16px) scale(1.06)} }

/* ===== HERO ===== */
.hero{
  min-height:55vh;
  padding:40px 0;
  color:#fff;
  position:relative;
  overflow:hidden;
  background:
    url("back.webp") center/cover no-repeat,
    url("back.jpg") center/cover no-repeat,
    url("back.png") center/cover no-repeat,
    linear-gradient(180deg, var(--bg2), var(--bg1));
}
.hero::before{
  content:"";
  position:absolute;
  inset:0;
  background:
    radial-gradient(900px 400px at 20% 10%, rgba(143,214,255,.16), transparent 55%),
    radial-gradient(800px 380px at 85% 15%, rgba(215,241,255,.10), transparent 55%),
    linear-gradient(180deg, rgba(3,6,13,.68), rgba(5,10,20,.86));
}
.container{
  position:relative;
  z-index:1;
  max-width:1300px;
  margin:auto;
  padding:0 20px;
}

.topbar{
  display:flex;
  justify-content:space-between;
  align-items:center;
  flex-wrap:wrap;
  gap:15px;
}

.brand{
  display:flex;
  align-items:center;
  gap:12px;
}

.logo{
  width:52px;height:52px;
  border-radius:14px;
  background:var(--glass);
  border:1px solid var(--border);
  display:flex;
  align-items:center;
  justify-content:center;
  backdrop-filter:blur(14px);
  -webkit-backdrop-filter:blur(14px);
  box-shadow:0 12px 22px rgba(0,0,10,.3);
}
.logo img{
  width:78%;
  height:78%;
  object-fit:contain;
  filter:drop-shadow(0 4px 8px rgba(0,0,10,.4));
}

.titleBox h1{
  margin:0;
  font-size:19px;
  font-weight:800;
  background:linear-gradient(90deg,#ffffff 0%,#d7f1ff 45%,#8fd6ff 100%);
  -webkit-background-clip:text;
  background-clip:text;
  color:transparent;
}
.titleBox span{
  font-size:12px;
  color:var(--muted);
  letter-spacing:1px;
}

.heroText{
  margin-top:90px;
}
.heroText h2{
  margin:0;
  font-size:27px;
  font-weight:800;
  color:var(--ivory);
}
.heroText p{
  margin-top:10px;
  color:var(--muted);
  font-size:14.5px;
  line-height:1.8;
}

/* ===== Gallery ===== */
main{
  position:relative;
  z-index:1;
  max-width:1300px;
  margin:40px auto;
  padding:0 20px;
}

.track{
  display:flex;
  gap:20px;
  overflow:auto;
  scroll-snap-type:x mandatory;
  padding-bottom:12px;
}
.track::-webkit-scrollbar{ height:8px; }
.track::-webkit-scrollbar-thumb{ background:rgba(143,214,255,.35); border-radius:999px; }
.track::-webkit-scrollbar-track{ background:rgba(255,255,255,.04); border-radius:999px; }

.card{
  min-width:250px;
  background:var(--glass);
  border:1px solid var(--border);
  border-radius:18px;
  overflow:hidden;
  box-shadow:0 14px 30px rgba(0,0,10,.35);
  backdrop-filter:blur(16px);
  -webkit-backdrop-filter:blur(16px);
  scroll-snap-align:start;
  cursor:pointer;
  transition:transform .25s ease, border-color .25s ease, box-shadow .25s ease;
}
.card:hover{
  transform:translateY(-6px);
  border-color:rgba(143,214,255,.55);
  box-shadow:0 26px 48px rgba(0,0,10,.5), 0 0 26px rgba(143,214,255,.14);
}

.thumb{
  aspect-ratio:3/4;
  overflow:hidden;
  background:rgba(255,255,255,.04);
}
.thumb img{
  width:100%;
  height:100%;
  object-fit:cover;
  transition:transform .3s ease;
}
.card:hover .thumb img{transform:scale(1.06);}

.meta{
  padding:14px 15px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  border-top:1px solid var(--border);
}

.meta b{
  color:var(--ivory);
  font-size:15px;
}

.open{
  text-decoration:none;
  background:linear-gradient(160deg, rgba(143,214,255,.22), rgba(143,214,255,.08));
  border:1px solid rgba(143,214,255,.4);
  color:#fff;
  padding:8px 14px;
  border-radius:10px;
  font-size:13px;
  font-weight:700;
  transition:transform .2s ease, background .2s ease, box-shadow .2s ease;
}
.open:hover{
  background:linear-gradient(160deg, rgba(143,214,255,.35), rgba(143,214,255,.14));
  transform:translateY(-2px);
  box-shadow:0 10px 22px rgba(143,214,255,.2);
}

footer{
  position:relative;
  z-index:1;
  text-align:center;
  padding:24px 20px 30px;
  font-size:12px;
  color:var(--muted);
  letter-spacing:.4px;
}

@media(max-width:600px){
  .card{min-width:190px}
  .heroText{margin-top:60px}
  .heroText h2{font-size:22px}
}
</style>
</head>

<body>

<section class="hero">
<div class="container">

  <div class="topbar">
    <div class="brand">
      <div class="logo">
        <img src="logo.png" alt="SMOU GROUP">
      </div>
      <div class="titleBox">
        <h1>الكبائن الروزجلود — Rosegold Cabin</h1>
        <span>SMOU GROUP</span>
      </div>
    </div>
  </div>

  <div class="heroText">
    <h2>معرض الكبائن الروزجلود</h2>
    <p>اسحب يمين أو يسار للتصفح. اضغط فتح لعرض الجولة 360°.</p>
  </div>

</div>
</section>

<main>
<div class="track" id="track"></div>
</main>

<footer>
© <span id="year"></span> SMOU GROUP — rosegold.smougroup.com
</footer>

<script>
document.getElementById("year").textContent = new Date().getFullYear();

const items = [
  {img:"2432.png",href:"https://orbix360.com/t/kC5yEiW44vYdkMPXUpID2wHoTEv2/4560328346042368"},
  {img:"2433.png",href:"https://orbix360.com/t/kC5yEiW44vYdkMPXUpID2wHoTEv2/6604685265862656"},
  {img:"2434.png",href:"https://orbix360.com/t/kC5yEiW44vYdkMPXUpID2wHoTEv2/4839158293987328"},
  {img:"2435.png",href:"https://orbix360.com/t/kC5yEiW44vYdkMPXUpID2wHoTEv2/4590637057835008"},
  {img:"2436.png",href:"https://orbix360.com/t/kC5yEiW44vYdkMPXUpID2wHoTEv2/5428078438252544"}
];

const track = document.getElementById("track");

items.forEach(it=>{
  const code = it.img.replace(".png","");
  const card = document.createElement("div");
  card.className="card";
  card.innerHTML=`
    <div class="thumb">
      <img src="${it.img}" alt="${code}">
    </div>
    <div class="meta">
      <b>${code}</b>
      <a class="open" href="${it.href}" target="_blank">فتح</a>
    </div>
  `;
  track.appendChild(card);
});
</script>

</body>
</html>
